name: worthless
on:
    push: 
jobs:
    setup: 
        runs-on: ubuntu-latest
        steps:

            - name: Checkout code
              uses: actions/checkout@v2

            - name: Set up Python
              uses: actions/setup-python@v2
              with:
                python-version: '3.8'
            - name: Install dependencies
              run: |
                pip install -r requirements.txt
                pip install semgrep

            - name: run semgrep
              run: semgrep --config p/ci . --json > semgrep-results.json
